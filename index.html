    }
    @keyframes marquee-rtl {
      0% { transform: translateX(-33.333%); }
      100% { transform: translateX(0); }

      display: flex;
      width: max-content;

    }

      display: flex;

    }
    @keyframes ripple-grow-fade {

    // Scroll Reveal Intersection Observer Component
    function Reveal({ children, className = "" }) {
      const [isVisible, setIsVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setIsVisible(true);
            }
          });
        }, { threshold: 0.05 });

        const current = domRef.current;
        if (current) observer.observe(current);
        return () => {
          if (current) observer.unobserve(current);
        };
      }, []);

      return (
        <div
          ref={domRef}
          className={`transition-all duration-1000 transform ease-out ${isVisible ? 'opacity-100 blur-none translate-y-0' : 'opacity-0 blur-md translate-y-8'} ${className}`}
        >
          {children}
        </div>
      );
    }

    // Typewriter Display Hook
    function useTypewriter(phrases, speed = 90, delay = 4500) {
      const [text, setText] = useState("");
      const [idx, setIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);

      useEffect(() => {
        let timer;
        const currentStr = phrases[idx];
        if (deleting) {
          timer = setTimeout(() => {
            setText(currentStr.substring(0, text.length - 1));
          }, speed / 2);
        } else {
          timer = setTimeout(() => {
            setText(currentStr.substring(0, text.length + 1));
          }, speed);
        }

        if (!deleting && text === currentStr) {
          timer = setTimeout(() => setDeleting(true), delay);
        } else if (deleting && text === "") {
          setDeleting(false);
          setIdx((prev) => (prev + 1) % phrases.length);
        }
        return () => clearTimeout(timer);
      }, [text, deleting, idx, phrases]);

      return text;
    }

                  <i className="fa-solid fa-bell animate-bounce"></i>
                </div>
                <p className="text-xs font-semibold text-slate-200 flex-1">{globalToast.message}</p>
              </div>
            </div>
          )}

          {/* SYSTEM APP EXIT / BACK NAVIGATION CONFIRMATION INTERCEPT BAR */}
          {exitModalOpen && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4">
              <div className="bg-gradient-to-b from-amoled-900 to-black border border-white/10 rounded-3xl p-8 w-full max-w-md shadow-2xl text-center space-y-6 animate-float-slow">
                <div className="w-16 h-16 rounded-2xl bg-brand-500/10 text-brand-500 border border-brand-500/20 flex items-center justify-center mx-auto shadow-inner">
                  <i className="fa-solid fa-arrow-right-from-bracket text-2xl animate-pulse"></i>
                </div>
                <div className="space-y-2">
                  <h3 className="font-display font-bold text-lg text-slate-100 uppercase tracking-tight">Confirm Exit Application</h3>
                  <p className="text-xs text-slate-400 leading-relaxed px-2">
                    Are you sure you want to exit? Your session history and current learning parameters are securely stored on cloud endpoints.
                  </p>
                </div>
                <div className="flex gap-3">
                  <button 
                    onClick={() => setExitModalOpen(false)}
                    className="flex-1 py-3 bg-amoled-850 hover:bg-amoled-800 text-slate-200 text-xs font-bold rounded-xl border border-white/5"
                  >
                    Keep Studying
                  </button>
                  <button 
                    onClick={confirmExitApp}
                    className="flex-1 py-3 bg-gradient-to-r from-red-600 to-rose-700 hover:from-red-700 hover:to-rose-800 text-white text-xs font-bold rounded-xl shadow-lg shadow-red-950/20"
                  >
                    Exit Now
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* AUTHENTICATION MODAL */}
          {authModal.isOpen && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-amoled-900 border border-white/5 rounded-2xl w-full max-w-md p-6 space-y-6 shadow-2xl relative">
                <button 
                  onClick={() => setAuthModal({ ...authModal, isOpen: false })}
                  className="absolute top-4 right-4 w-8 h-8 rounded-lg bg-amoled-800 text-slate-400 hover:text-white flex items-center justify-center"
                >
                  <i className="fa-solid fa-xmark"></i>
                </button>

                {/* Tab selections */}
                <div className="flex border-b border-white/5 pb-1 relative">
                  <button 
                    onClick={() => setAuthModal({ ...authModal, tab: 'login' })}
                    className={`flex-1 pb-3 text-xs font-bold uppercase tracking-wider text-center transition-colors ${authModal.tab === 'login' ? 'text-brand-500' : 'text-slate-400'}`}
                  >
                    Login
                  </button>
                  <button 
                    onClick={() => setAuthModal({ ...authModal, tab: 'signup' })}
                    className={`flex-1 pb-3 text-xs font-bold uppercase tracking-wider text-center transition-colors ${authModal.tab === 'signup' ? 'text-brand-500' : 'text-slate-400'}`}
                  >
                    Signup
                  </button>
                  <div className={`absolute bottom-0 h-0.5 w-1/2 bg-brand-500 rounded-full transition-transform duration-300 ${authModal.tab === 'signup' ? 'translate-x-full' : 'translate-x-0'}`}></div>
                </div>

                <div className="text-center space-y-1">
                  <h3 className="font-display font-extrabold text-xl text-white">
                    Welcome to EduTube
                  </h3>
                  <p className="text-xs text-slate-400">Join parameters and catalog personal bookmarks logs.</p>
                </div>

                <form onSubmit={handleAuthSubmit} className="space-y-4">
                  <div>
                    <label className="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Email Address</label>
                    <input 
                      type="email" 
                      required
                      value={authForm.email}
                      onChange={(e) => setAuthForm({ ...authForm, email: e.target.value })}
                      className="w-full bg-amoled-950 border border-white/10 rounded-xl px-4 py-3.5 text-xs focus:outline-none focus:border-brand-500 text-slate-200"
                      placeholder="e.g. name@domain.com"
                    />
                  </div>

                  <div>
                    <label className="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Password</label>
                    <input 
                      type="password" 
                      required
                      value={authForm.password}
                      onChange={(e) => setAuthForm({ ...authForm, password: e.target.value })}
                      className="w-full bg-amoled-950 border border-white/10 rounded-xl px-4 py-3.5 text-xs focus:outline-none focus:border-brand-500 text-slate-200"
                      placeholder="••••••••"
                    />
                  </div>

                  {authErr && (
                    <p className="text-xs text-rose-500 bg-rose-950/20 border border-rose-500/20 py-2 px-3 rounded-lg text-center font-bold">{authErr}</p>
                  )}

                  <button 
                    type="submit" 
                    className="w-full py-3.5 bg-brand-600 hover:bg-brand-700 text-white text-xs font-bold rounded-xl transition-all"
                  >
                    {authModal.tab === 'login' ? 'Proceed with Login' : 'Complete Registration'}
                  </button>
                </form>

                <div className="relative flex py-1 items-center">
                  <div className="flex-grow border-t border-white/5"></div>
                  <span className="flex-shrink mx-3 text-[10px] text-slate-500 font-bold tracking-wider uppercase">OR</span>
                  <div className="flex-grow border-t border-white/5"></div>
                </div>

                <button 
                  onClick={handleGoogleSignIn}
                  className="w-full py-3.5 bg-amoled-950 border border-white/10 hover:bg-amoled-850 text-slate-200 text-xs font-bold rounded-xl flex items-center justify-center gap-2 transition-all"
                >
                  <i className="fa-brands fa-google text-brand-500"></i>
                  <span>Continue with Google</span>
                </button>
              </div>
            </div>
          )}

          {/* ACTIVE EMBEDDED STREAM RECEPTOR PLAYER */}
          {watchVideo && (
            <div className="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-4">
              <div className="relative w-full max-w-4xl bg-amoled-900 border border-white/5 rounded-2xl overflow-hidden shadow-2xl">
                
                {/* Embedded Header Info */}
                <div className="p-4 bg-amoled-950 flex items-center justify-between border-b border-white/5">
                  <div className="truncate pr-4 flex items-center gap-2">
                    <span className="px-2 py-0.5 bg-brand-500/10 border border-brand-500/20 text-brand-500 text-[9px] font-bold rounded uppercase">{watchVideo.category}</span>
                    <span className="text-xs font-bold text-white truncate">{watchVideo.title}</span>
                  </div>
                  <button 
                    onClick={() => setWatchVideo(null)}
                    className="w-8 h-8 rounded-lg bg-amoled-850 text-slate-400 hover:text-white flex items-center justify-center"
                  >
                    <i className="fa-solid fa-xmark"></i>
                  </button>
                </div>

                {/* Secure video container viewport */}
                <div className="aspect-video w-full bg-black">
                  <iframe 
                    width="100%" 
                    height="100%" 
                    src={`https://www.youtube.com/embed/${watchVideo.videoId}?autoplay=1&rel=0`} 
                    title={watchVideo.title} 
                    frameBorder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowFullScreen
                  ></iframe>
                </div>

                {/* Embedded Bottom bar */}
                <div className="p-4 bg-amoled-950 flex items-center justify-between text-xs text-slate-500">
                  <span className="font-bold text-slate-300">Channel Source: {watchVideo.channelName}</span>
                  <span>Streaming via secure iFrame protocols</span>
                </div>
              </div>
            </div>
          )}

          {/* POP-UPS DIALOG */}
          {popup.isOpen && (
            <div className="fixed inset-0 bg-black/85 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-amoled-900 border border-white/5 rounded-2xl p-6 w-full max-w-sm shadow-2xl space-y-4">
                <div className="flex items-center justify-between border-b border-white/5 pb-2">
                  <h3 className="font-display font-bold text-slate-200 text-sm">{popup.title}</h3>
                  <button onClick={() => setPopup({ ...popup, isOpen: false })} className="text-slate-400 hover:text-white">
                    <i className="fa-solid fa-xmark"></i>
                  </button>
                </div>
                <p className="text-xs text-slate-400 leading-relaxed whitespace-pre-line">{popup.content}</p>
                {popup.title.includes("Contact") && (
                  <div className="p-3 bg-amoled-950 border border-white/5 rounded-xl flex items-center gap-3">
                    <div className="w-8 h-8 rounded-lg bg-brand-500/10 flex items-center justify-center text-brand-500">
                      <i className="fa-solid fa-envelope"></i>
                    </div>
                    <div className="text-[10px]">
                      <p className="text-slate-500 font-bold">ADMIN EMAIL</p>
                      <a href="mailto:thepremanshu@gmail.com" className="text-brand-500 hover:underline font-bold">thepremanshu@gmail.com</a>
                    </div>
                  </div>
                )}
                <button 
                  onClick={() => setPopup({ ...popup, isOpen: false })}
                  className="w-full py-2 bg-amoled-800 hover:bg-amoled-750 text-slate-200 text-xs font-bold rounded-xl"
                >
                  Close Window
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Reusable Custom Premium Video Card
    function VideoCard({ video, isBookmarked, onBookmark, onPlay, showHistoryMenu, onDeleteHistory, homeSmallThumb }) {
      const vidId = video.videoId;
      const thumbnailImg = getThumbnail(vidId);
      const [showDropdown, setShowDropdown] = useState(false);
      const dropdownRef = useRef(null);

      useEffect(() => {
        function clickOutside(e) {
          if (dropdownRef.current && !dropdownRef.current.contains(e.target)) {
            setShowDropdown(false);
          }
        }
        document.addEventListener("mousedown", clickOutside);
        return () => document.removeEventListener("mousedown", clickOutside);
      }, []);

      return (
        <div className="group bg-amoled-900 border border-white/5 hover:border-brand-500/30 rounded-2xl overflow-hidden transition-all duration-300 flex flex-col h-full hover:-translate-y-1 hover:shadow-2xl relative">
          
          {/* Sizing of thumbnail decreased significantly inside Home-Page Spotlight slider if prop is matched */}
          <div className={`relative overflow-hidden bg-amoled-950 ${homeSmallThumb ? 'aspect-[16/10]' : 'aspect-video'}`}>
            <img 
              src={thumbnailImg} 
              alt={video.title} 
              loading="lazy"
              className="w-full h-full object-cover group-hover:scale-[1.03] transition-transform duration-500"
              onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=640&q=80" }}
            />
            <div className="absolute inset-0 bg-gradient-to-t from-amoled-950 via-amoled-900/30 to-transparent opacity-80"></div>

            <span className="absolute top-2.5 left-2.5 px-2 py-0.5 bg-amoled-950/95 backdrop-blur-md border border-white/10 text-[9px] font-bold uppercase rounded-md tracking-wider text-brand-400">
              {video.category}
            </span>

            {!showHistoryMenu && (
              <button 
                onClick={(e) => { e.stopPropagation(); onBookmark(video); }}
                className="absolute top-2.5 right-2.5 w-7.5 h-7.5 p-1.5 rounded-lg bg-amoled-950/95 backdrop-blur-md border border-white/10 flex items-center justify-center text-xs text-slate-300 hover:text-brand-500 transition-colors shadow"
              >
                <i className={`${isBookmarked ? 'fa-solid fa-heart text-brand-500' : 'fa-regular fa-heart'}`}></i>
              </button>
            )}

            {/* Watch history action menus */}
            {showHistoryMenu && (
              <div className="absolute top-2.5 right-2.5" ref={dropdownRef}>
                <button 
                  onClick={(e) => { e.stopPropagation(); setShowDropdown(!showDropdown); }}
                  className="w-7.5 h-7.5 bg-amoled-950/95 backdrop-blur-md border border-white/10 text-slate-300 hover:text-rose-500 flex items-center justify-center rounded-lg transition-colors shadow"
                >
                  <i className="fa-solid fa-ellipsis-vertical text-xs"></i>
                </button>
                {showDropdown && (
                  <div className="absolute right-0 mt-1 bg-amoled-950 border border-white/10 p-1 rounded-lg shadow-xl z-20 w-36">
                    <button 
                      onClick={(e) => {
                        e.stopPropagation();
                        setShowDropdown(false);
                        onDeleteHistory(video.id);
                      }}
                      className="w-full text-left px-2.5 py-1.5 text-[10px] font-bold text-rose-500 hover:bg-rose-950/20 rounded flex items-center gap-1.5"
                    >
                      <i className="fa-solid fa-trash-can"></i>
                      <span>Delete Entry</span>
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Description Block */}
          <div className="p-4 flex flex-col justify-between flex-grow gap-4">
            <div className="space-y-1.5">
              <h4 className="text-xs md:text-sm font-bold text-slate-200 line-clamp-2 leading-snug group-hover:text-white transition-colors">
                {video.title}
              </h4>
              <div className="flex items-center gap-1.5 text-slate-500 text-[10px] font-bold tracking-wide uppercase">
                <div className="w-4 h-4 rounded bg-brand-500/10 text-brand-400 flex items-center justify-center font-bold text-[9px]">
                  {video.channelName ? video.channelName[0].toUpperCase() : 'E'}
                </div>
                <span className="truncate">{video.channelName}</span>
              </div>
            </div>

            <button 
              onClick={() => onPlay(video)}
              className="w-full py-2.5 bg-amoled-950 hover:bg-brand-600 text-slate-300 hover:text-white border border-white/5 hover:border-transparent text-xs font-bold rounded-xl flex items-center justify-center gap-1.5 transition-all"
            >
              <i className="fa-solid fa-play text-[9px]"></i>
              Watch Now
            </button>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
